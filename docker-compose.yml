services:
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - web_app_node_modules:/workspace/apps/web/node_modules
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://krishiai:krishiai_local_password@db:5432/krishiai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BHASHINI_API_KEY: ${BHASHINI_API_KEY:-}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-krishiai}
      POSTGRES_USER: ${POSTGRES_USER:-krishiai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-krishiai_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  web_app_node_modules:

networks:
  default:
    name: krishiai_network
